<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="E-Logistic — platforma dla kierowców, spedytorów i firm transportowych">
  <title>E-Logistic</title>
  <!-- ── tło ── -->
  <rect width="1200" height="360" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1198" height="358" fill="none" stroke="#1c1c20" stroke-width="2"/>

  <!-- ── wordmark ── -->
  <text x="600" y="150" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="106" font-weight="800" letter-spacing="3" fill="#f5f5f5"><tspan fill="#E50914">E‑</tspan>LOGISTIC</text>
  <!-- ── tagline ── -->
  <text x="600" y="194" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="18" font-weight="600" letter-spacing="6" fill="#9a9a9a">KIEROWCY · SPEDYTORZY · FIRMY TRANSPORTOWE</text>
  <!-- ── platformy ── -->
  <text x="600" y="226" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="4" fill="#E50914">WEB · iOS · ANDROID · macOS — OFFLINE-FIRST</text>

  <!-- ── trasa (droga) ── -->
  <line x1="48" y1="320" x2="1152" y2="320" stroke="#1c1c20" stroke-width="16" stroke-linecap="round"/>
  <line x1="48" y1="320" x2="1152" y2="320" stroke="#3a3a3f" stroke-width="2" stroke-dasharray="20 24"/>
  <!-- odcinek przebyty (solid crimson) -->
  <line x1="48" y1="320" x2="296" y2="320" stroke="#E50914" stroke-width="6" stroke-linecap="round"/>
  <!-- odcinek przed nami (dashed crimson) -->
  <line x1="380" y1="320" x2="1088" y2="320" stroke="#E50914" stroke-width="4" stroke-dasharray="4 16" stroke-linecap="round" opacity="0.55"/>
  <!-- punkty trasy -->
  <circle cx="560" cy="320" r="6" fill="#E50914"/>
  <circle cx="820" cy="320" r="6" fill="#E50914"/>

  <!-- ── pin celu ── -->
  <path d="M1092 258 c-16 0 -28 12 -28 28 c0 19 28 34 28 34 c0 0 28 -15 28 -34 c0 -16 -12 -28 -28 -28 Z" fill="#E50914"/>
  <circle cx="1092" cy="286" r="9" fill="#0a0a0a"/>

  <!-- ── sylwetka TIR-a (jedzie w prawo) ── -->
  <g fill="#E50914">
    <rect x="150" y="260" width="142" height="46" rx="4"/>
    <path d="M292 306 V266 H314 L332 244 H358 L368 266 V306 Z"/>
    <circle cx="196" cy="308" r="13"/>
    <circle cx="238" cy="308" r="13"/>
    <circle cx="338" cy="308" r="13"/>
  </g>
  <g fill="#0a0a0a">
    <circle cx="196" cy="308" r="5"/>
    <circle cx="238" cy="308" r="5"/>
    <circle cx="338" cy="308" r="5"/>
  </g>
  <!-- linie prędkości -->
  <g stroke="#E50914" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="98" y1="266" x2="132" y2="266"/>
    <line x1="82" y1="282" x2="126" y2="282"/>
    <line x1="104" y1="298" x2="132" y2="298"/>
  </g>
</svg>
