packages:
  - "apps/*"
  - "packages/*"

# Expo + React Native (Metro) wymaga płaskiego node_modules w monorepo.
# pnpm 11 czyta ustawienia STĄD — .npmrc z tym samym kluczem jest ignorowany
# (dlatego pierwszy build EAS padł na „Unable to resolve module").
nodeLinker: hoisted

# Skrypty buildów natywnych zależności dozwolone jawnie (pnpm 11).
allowBuilds:
  # sentry-cli: postinstall zbędny — nie uploadujemy sourcemap (decyzja #306)
  '@sentry/cli': false
  sharp: true

# Override bezpieczeństwa (audyt #216): postcss (XSS via next) — next przypina postcss@8.4.31,
# override podbija do bezpiecznej linii. uuid<11 pominięty — major bump (7→11) zepsułby Expo SDK
# (transitive, build-only). Override @xmldom/xmldom usunięty (audyt N26): był martwym no-opem —
# w drzewie tylko @expo/plist→0.8.13 i plist→0.9.10, oba już ≥0.8.0, nic nie żąda <0.8.0.
overrides:
  "postcss@<8.5.10": ">=8.5.10"
