name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Bramki jakości
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Instalacja
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format)
        run: pnpm lint

      - name: Dokumentacja (sync z kodem)
        run: pnpm docs:check

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Testy
        run: pnpm -r test

      - name: Build web
        run: pnpm --filter @e-logistic/web build

      - name: Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (przepływy publiczne)
        run: pnpm e2e

  rls:
    name: Audyt RLS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Instalacja
        run: pnpm install --frozen-lockfile

      - name: Audyt RLS (izolacja multi-tenant)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning title=Audyt RLS pominięty::Brak sekretu SUPABASE_DB_URL — dodaj w Settings → Secrets and variables → Actions."
            exit 0
          fi
          pnpm audit:rls

  gitleaks:
    name: Skan sekretów
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
